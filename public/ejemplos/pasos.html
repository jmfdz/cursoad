<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Asistente por pasos - Curso Accesibilidad</title>
  <!-- CSS de Bootstrap 5 desde CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet" >

  <link
          href="estilos.css"
          rel="stylesheet" >

 <style>
    .step-card {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .step-card.active {
      border: 2px solid #0d6efd;
      background-color: #005682;
      color: #ffffff;
    }
    .step-section {
      display: none;
    }
    .step-section.active {
      display: block;
    }
    label.form-label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Contenido principal (aquí puedes añadir lo que desees para la portada) -->
  <main>
     <div class="container py-5">
    <h1 class="mb-4">Proceso de Matrícula</h1>

    <div class="row text-center mb-4" role="group" aria-label="Pasos del proceso de matrícula">
      <div class="col-md-4">
        <button id="btn-step-1" class="card step-card active w-100" type="button" aria-controls="step-1" aria-current="step">
          <span class="card-body d-block">Paso 1: Datos personales</span>
        </button>
      </div>
      <div class="col-md-4">
        <button id="btn-step-2" class="card step-card w-100" type="button" aria-controls="step-2">
          <span class="card-body d-block">Paso 2: Datos académicos</span>
        </button>
      </div>
      <div class="col-md-4">
        <button id="btn-step-3" class="card step-card w-100" type="button" aria-controls="step-3">
          <span class="card-body d-block">Paso 3: Opciones y pago</span>
        </button>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-md-6">
        <!-- Paso 1 -->
        <div id="step-1" class="step-section active">
          <h2 tabindex="-1">Datos personales</h2>
          <form id="form-step-1">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="nombre" required>
            </div>
            <div class="mb-3">
              <label for="apellidos" class="form-label">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" required>
            </div>
            <div class="mb-3">
              <label for="dni" class="form-label">DNI</label>
              <input type="text" class="form-control" id="dni" required>
            </div>
            <fieldset class="mb-3">
              <legend class="form-label">Género</legend>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="genero" id="masculino" value="Masculino" required>
                <label class="form-check-label" for="masculino">Masculino</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="genero" id="femenino" value="Femenino">
                <label class="form-check-label" for="femenino">Femenino</label>
              </div>
            </fieldset>
          </form>
        </div>

        <!-- Paso 2 -->
        <div id="step-2" class="step-section">
          <h2 tabindex="-1">Datos académicos</h2>
          <form id="form-step-2">
            <div class="mb-3">
              <label for="estudio" class="form-label">Estudio</label>
              <select class="form-select" id="estudio" required>
                <option selected disabled value="">Selecciona un estudio</option>
                <option>Ingeniería Informática</option>
                <option>Derecho</option>
                <option>Psicología</option>
                <option>Biología</option>
              </select>
            </div>
            <fieldset class="mb-3">
              <legend class="form-label">Asignaturas</legend>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="Matemáticas" id="asig1">
                <label class="form-check-label" for="asig1">Matemáticas</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="Programación" id="asig2">
                <label class="form-check-label" for="asig2">Programación</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="Estadística" id="asig3">
                <label class="form-check-label" for="asig3">Estadística</label>
              </div>
            </fieldset>
          </form>
        </div>

        <!-- Paso 3 -->
        <div id="step-3" class="step-section">
          <h2 tabindex="-1">Opciones y forma de pago</h2>
          <form id="form-step-3">
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="discapacidad">
              <label class="form-check-label" for="discapacidad">Necesito ayuda por discapacidad</label>
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="info-ua">
              <label class="form-check-label" for="info-ua">Deseo recibir información de la UA</label>
            </div>
            <div class="mb-3">
              <label class="form-label">Forma de pago</label>
              <select class="form-select" id="pago" required>
                <option value="">Selecciona forma de pago</option>
                <option>Efectivo</option>
                <option>Tarjeta</option>
                <option>Transferencia</option>
              </select>
            </div>
          </form>
        </div>

        <!-- Botones de navegación -->
        <div class="d-flex justify-content-between mt-4">
          <button id="btn-prev" class="btn btn-light d-none" type="button">Atrás</button>
          <button id="btn-next" class="btn btn-primary" type="button">Siguiente</button>
        </div>
      </div>
    </div>
  </div>
</main>

 <!-- JS de Bootstrap 5 desde CDN -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

  <script>
    const steps = ["step-1", "step-2", "step-3"];
    let currentStep = 0;

    const showStep = (index) => {
      steps.forEach((stepId, i) => {
        document.getElementById(stepId).classList.toggle("active", i === index);
        const stepButton = document.getElementById("btn-" + stepId);
        stepButton.classList.toggle("active", i === index);
        stepButton.toggleAttribute("aria-current", i === index);
      });

      document.getElementById("btn-prev").classList.toggle("d-none", index === 0);
      document.getElementById("btn-next").textContent = index === steps.length - 1 ? "Enviar" : "Siguiente";
      document.querySelector(`#${steps[index]} h2`).focus();
    };

    document.getElementById("btn-next").addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      } else {
        alert("Formulario enviado correctamente!");
        // Aquí puedes hacer el envío AJAX si lo deseas
      }
    });

    document.getElementById("btn-prev").addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });

    document.getElementById("btn-step-1").addEventListener("click", () => { currentStep = 0; showStep(currentStep); });
    document.getElementById("btn-step-2").addEventListener("click", () => { currentStep = 1; showStep(currentStep); });
    document.getElementById("btn-step-3").addEventListener("click", () => { currentStep = 2; showStep(currentStep); });
  </script>

 
</body>
</html>
